<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Everton GPS Pro - Multiempresa</title>
    <style>
        * { box-sizing: border-box; }
        body { margin: 0; font-family: sans-serif; background: #0a0d12; color: white; min-height: 100vh; display: flex; flex-direction: column; }
        #map { height: 35vh; width: 100%; background: #000; }
        .container { padding: 20px; flex: 1; }
        .hidden { display: none !important; }

        .auth-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.95); display: flex; align-items: center; justify-content: center; z-index: 9999; overflow-y: auto; }
        .auth-card { background: #131820; padding: 30px; border-radius: 12px; display: flex; flex-direction: column; gap: 12px; width: 90%; max-width: 340px; border: 1px solid #333; margin: 20px 0; }
        .auth-tabs { display: flex; gap: 4px; margin-bottom: 8px; }
        .auth-tab { flex: 1; padding: 10px; text-align: center; background: #1a212b; border-radius: 6px; cursor: pointer; font-size: 0.85em; color: #999; }
        .auth-tab.active { background: #00ffa6; color: #000; font-weight: bold; }

        input, select { padding: 12px; border-radius: 6px; border: 1px solid #444; background: #1a212b; color: white; width: 100%; font-size: 0.95em; }
        button { padding: 12px; background: #00ffa6; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; color: #000; }
        button.secondary { background: #2a3341; color: #fff; border: 1px solid #444; }
        button.danger { background: #ff4d5e; color: #fff; }
        .small-link { text-align: center; font-size: 0.8em; color: #00ffa6; cursor: pointer; text-decoration: underline; }
        .error-msg { color: #ff6b6b; font-size: 0.85em; text-align: center; min-height: 1em; }

        .tag-veiculo { background: #1a212b; padding: 12px; margin-bottom: 8px; border-radius: 8px; border: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
        .tag-membro { background: #1a212b; padding: 10px 12px; margin-bottom: 8px; border-radius: 8px; border: 1px solid #333; display: flex; justify-content: space-between; align-items: center; font-size: 0.9em; }
        .badge { font-size: 0.7em; padding: 3px 8px; border-radius: 10px; background: #2a3341; }
        .badge.admin { background: #00ffa6; color: #000; }

        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .empresa-nome { font-weight: bold; font-size: 1.1em; }
        .role-info { color: #999; font-size: 0.8em; }

        h4 { border-bottom: 1px solid #333; padding-bottom: 8px; margin-top: 25px; }
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
</head>
<body>

    <!-- MODAL DE AUTENTICAÇÃO -->
    <div id="authModal" class="auth-overlay">
        <div class="auth-card">
            <h3 style="text-align:center; margin:0;">🔐 Everton GPS Pro</h3>

            <div class="auth-tabs">
                <div class="auth-tab active" id="tabLogin">Entrar</div>
                <div class="auth-tab" id="tabCadastro">Cadastrar Empresa</div>
            </div>

            <!-- FORM LOGIN -->
            <div id="formLogin">
                <input type="email" id="loginEmail" placeholder="E-mail" style="margin-bottom:10px;">
                <input type="password" id="loginSenha" placeholder="Senha" style="margin-bottom:10px;">
                <button id="btnLogin">Entrar no Sistema</button>
            </div>

            <!-- FORM CADASTRO DE EMPRESA -->
            <div id="formCadastro" class="hidden">
                <input type="text" id="cadNomeEmpresa" placeholder="Nome da empresa" style="margin-bottom:10px;">
                <input type="email" id="cadEmail" placeholder="Seu e-mail (admin)" style="margin-bottom:10px;">
                <input type="password" id="cadSenha" placeholder="Crie uma senha" style="margin-bottom:10px;">
                <button id="btnCadastrarEmpresa">Criar Conta da Empresa</button>
            </div>

            <div id="authError" class="error-msg"></div>
        </div>
    </div>

    <div id="map"></div>
    <div class="container hidden" id="appContent">

        <div class="top-bar">
            <div>
                <div class="empresa-nome" id="empresaNomeDisplay">-</div>
                <div class="role-info" id="userLogadoInfo"></div>
            </div>
            <button class="secondary" id="btnLogout">Sair</button>
        </div>

        <h4>🚗 Frota</h4>
        <div class="input-box" style="display: flex; gap: 5px;">
            <input type="text" id="veiculoInput" placeholder="Nome do veículo" style="flex: 1;">
            <button id="btnAdicionar">Adicionar</button>
        </div>
        <div id="listaFrotaLocal" class="frota-lista" style="margin-top: 15px;"></div>

        <!-- SÓ APARECE PARA ADMIN -->
        <div id="painelAdmin" class="hidden">
            <h4>👥 Equipe</h4>
            <div id="listaMembros"></div>

            <h4>➕ Convidar Funcionário</h4>
            <div style="display:flex; flex-direction:column; gap:8px;">
                <input type="text" id="novoMembroNome" placeholder="Nome do funcionário">
                <input type="email" id="novoMembroEmail" placeholder="E-mail do funcionário">
                <input type="password" id="novoMembroSenha" placeholder="Senha temporária">
                <button id="btnConvidarMembro">Adicionar Funcionário</button>
                <div id="convidarStatus" class="error-msg"></div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>

    <script>
        // ============ CAPTURADOR DE ERROS (TEMPORÁRIO PARA DEBUG) ============
        // Mostra qualquer erro de JavaScript na tela, mesmo sem abrir o console.
        window.onerror = function(msg, url, line, col, error) {
            const el = document.getElementById('authError');
            if (el) {
                el.style.color = "#ff6b6b";
                el.style.fontWeight = "bold";
                el.textContent = "ERRO DE DEBUG: " + msg + " (linha " + line + ")";
            } else {
                alert("ERRO DE DEBUG: " + msg + " (linha " + line + ")");
            }
            return false;
        };

        // ============ CONFIGURAÇÃO ============
        const firebaseConfig = {
            apiKey: "AIzaSyDwKIS8wL3D7OuaysVFV_xyAsFsKo2eXzY",
            authDomain: "everton-gps.firebaseapp.com",
            databaseURL: "https://everton-gps-default-rtdb.firebaseio.com",
            projectId: "everton-gps",
            storageBucket: "everton-gps.firebasestorage.app",
            messagingSenderId: "688936933095",
            appId: "1:688936933095:web:790b2407334e8b148e3442"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        const map = L.map('map').setView([-29.6133, -52.1919], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        let empresaAtualId = null;
        let roleAtual = null;

        // ============ UI: TROCA DE ABAS ============
        const tabLogin = document.getElementById('tabLogin');
        const tabCadastro = document.getElementById('tabCadastro');
        const formLogin = document.getElementById('formLogin');
        const formCadastro = document.getElementById('formCadastro');

        tabLogin.addEventListener('click', () => {
            tabLogin.classList.add('active');
            tabCadastro.classList.remove('active');
            formLogin.classList.remove('hidden');
            formCadastro.classList.add('hidden');
            document.getElementById('authError').textContent = "";
        });
        tabCadastro.addEventListener('click', () => {
            tabCadastro.classList.add('active');
            tabLogin.classList.remove('active');
            formCadastro.classList.remove('hidden');
            formLogin.classList.add('hidden');
            document.getElementById('authError').textContent = "";
        });

        function mostrarErro(msg) {
            document.getElementById('authError').textContent = msg;
        }

        // ============ LOGIN ============
        document.getElementById('btnLogin').addEventListener('click', () => {
            const email = document.getElementById('loginEmail').value.trim();
            const senha = document.getElementById('loginSenha').value;
            if (!email || !senha) return mostrarErro("Preencha e-mail e senha.");
            auth.signInWithEmailAndPassword(email, senha)
                .catch(e => mostrarErro(traduzErro(e)));
        });

        // ============ CADASTRO DE NOVA EMPRESA ============
        document.getElementById('btnCadastrarEmpresa').addEventListener('click', () => {
            const nomeEmpresa = document.getElementById('cadNomeEmpresa').value.trim();
            const email = document.getElementById('cadEmail').value.trim();
            const senha = document.getElementById('cadSenha').value;

            if (!nomeEmpresa || !email || !senha) return mostrarErro("Preencha todos os campos.");
            if (senha.length < 6) return mostrarErro("A senha precisa ter no mínimo 6 caracteres.");

            auth.createUserWithEmailAndPassword(email, senha)
                .then(async (cred) => {
                    const uid = cred.user.uid;
                    const novaEmpresaRef = db.ref('empresas').push();
                    const empresaId = novaEmpresaRef.key;

                    await novaEmpresaRef.set({
                        nome: nomeEmpresa,
                        plano: "trial",
                        criadoEm: Date.now(),
                        frota: [],
                        membros: {
                            [uid]: { email: email, role: "admin", nome: "Admin" }
                        }
                    });

                    await db.ref(`mapaUsuarioEmpresa/${uid}`).set(empresaId);
                    // onAuthStateChanged cuida do resto (carregar dashboard)
                })
                .catch(e => mostrarErro(traduzErro(e)));
        });

        function traduzErro(e) {
            const map = {
                "auth/email-already-in-use": "Este e-mail já está cadastrado.",
                "auth/invalid-email": "E-mail inválido.",
                "auth/weak-password": "Senha muito fraca (mínimo 6 caracteres).",
                "auth/wrong-password": "Senha incorreta.",
                "auth/user-not-found": "Usuário não encontrado.",
                "auth/invalid-credential": "E-mail ou senha incorretos."
            };
            return map[e.code] || ("Erro: " + e.message);
        }

        // ============ ESTADO DE AUTENTICAÇÃO ============
        auth.onAuthStateChanged(async (user) => {
            if (!user) {
                document.getElementById('authModal').style.display = "flex";
                document.getElementById('appContent').classList.add('hidden');
                return;
            }

            const mapaSnap = await db.ref(`mapaUsuarioEmpresa/${user.uid}`).once('value');
            empresaAtualId = mapaSnap.val();

            if (!empresaAtualId) {
                mostrarErro("Este usuário não está vinculado a nenhuma empresa.");
                auth.signOut();
                return;
            }

            document.getElementById('authModal').style.display = "none";
            document.getElementById('appContent').classList.remove('hidden');

            carregarEmpresa(user.uid);
        });

        // ============ CARREGAR DADOS DA EMPRESA ============
        function carregarEmpresa(uid) {
            const empresaRef = db.ref(`empresas/${empresaAtualId}`);

            empresaRef.child('nome').once('value').then(snap => {
                document.getElementById('empresaNomeDisplay').textContent = snap.val() || "Empresa";
            });

            empresaRef.child(`membros/${uid}`).once('value').then(snap => {
                const membro = snap.val() || {};
                roleAtual = membro.role || "operador";
                document.getElementById('userLogadoInfo').textContent =
                    (membro.email || auth.currentUser.email) + " · " + (roleAtual === "admin" ? "Administrador" : "Operador");

                if (roleAtual === "admin") {
                    document.getElementById('painelAdmin').classList.remove('hidden');
                    carregarMembros();
                } else {
                    document.getElementById('painelAdmin').classList.add('hidden');
                }
            });

            empresaRef.child('frota').on('value', snap => {
                const frota = snap.val() || [];
                document.getElementById('listaFrotaLocal').innerHTML = frota.map(v =>
                    `<div class="tag-veiculo">🚗 ${v}</div>`
                ).join('') || '<div style="color:#666;">Nenhum veículo cadastrado ainda.</div>';
            });
        }

        function carregarMembros() {
            db.ref(`empresas/${empresaAtualId}/membros`).on('value', snap => {
                const membros = snap.val() || {};
                const html = Object.values(membros).map(m =>
                    `<div class="tag-membro"><span>${m.nome || m.email}</span><span class="badge ${m.role === 'admin' ? 'admin' : ''}">${m.role === 'admin' ? 'Admin' : 'Operador'}</span></div>`
                ).join('');
                document.getElementById('listaMembros').innerHTML = html || '<div style="color:#666;">Nenhum membro ainda.</div>';
            });
        }

        // ============ ADICIONAR VEÍCULO (COMPARTILHADO NA EMPRESA) ============
        document.getElementById('btnAdicionar').addEventListener('click', () => {
            const input = document.getElementById('veiculoInput');
            const nome = input.value.trim().toUpperCase();
            if (!nome || !empresaAtualId) return;

            const frotaRef = db.ref(`empresas/${empresaAtualId}/frota`);
            frotaRef.once('value').then(snap => {
                let frota = snap.val() || [];
                if (!frota.includes(nome)) {
                    frota.push(nome);
                    frotaRef.set(frota);
                    input.value = "";
                }
            });
        });

        // ============ CONVIDAR FUNCIONÁRIO (SEM DESLOGAR O ADMIN) ============
        // Truque: cria o novo usuário numa instância SECUNDÁRIA do Firebase,
        // assim a sessão do admin logado no app principal não é substituída.
        document.getElementById('btnConvidarMembro').addEventListener('click', async () => {
            const nome = document.getElementById('novoMembroNome').value.trim();
            const email = document.getElementById('novoMembroEmail').value.trim();
            const senha = document.getElementById('novoMembroSenha').value;
            const statusEl = document.getElementById('convidarStatus');
            statusEl.style.color = "#ff6b6b";
            statusEl.textContent = "";

            if (!nome || !email || !senha) {
                statusEl.textContent = "Preencha todos os campos.";
                return;
            }
            if (senha.length < 6) {
                statusEl.textContent = "A senha precisa ter no mínimo 6 caracteres.";
                return;
            }

            let secondaryApp;
            try {
                secondaryApp = firebase.initializeApp(firebaseConfig, "Secundario_" + Date.now());
                const cred = await secondaryApp.auth().createUserWithEmailAndPassword(email, senha);
                const novoUid = cred.user.uid;

                await db.ref(`empresas/${empresaAtualId}/membros/${novoUid}`).set({
                    email: email,
                    nome: nome,
                    role: "operador"
                });
                await db.ref(`mapaUsuarioEmpresa/${novoUid}`).set(empresaAtualId);

                await secondaryApp.auth().signOut();
                await secondaryApp.delete();

                statusEl.style.color = "#00ffa6";
                statusEl.textContent = "Funcionário adicionado com sucesso!";
                document.getElementById('novoMembroNome').value = "";
                document.getElementById('novoMembroEmail').value = "";
                document.getElementById('novoMembroSenha').value = "";
            } catch (e) {
                statusEl.textContent = traduzErro(e);
                if (secondaryApp) { try { await secondaryApp.delete(); } catch(_) {} }
            }
        });

        // ============ LOGOUT ============
        document.getElementById('btnLogout').addEventListener('click', () => {
            auth.signOut();
            empresaAtualId = null;
            roleAtual = null;
        });
    </script>
</body>
</html>
