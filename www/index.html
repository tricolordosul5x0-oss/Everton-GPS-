
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rastreador Everton GPS - Multi-Frota</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.css" />
    <style>
        :root {
            --bg-main: #0a0d12;
            --bg-card: #131820;
            --border: rgba(255,255,255,.08);
            --signal-on: #00ffa6;
            --signal-off: #ffb020;
            --danger: #ff5470;
            --telemetry: #2dd4ff;
            --text: #eef2f6;
            --text-dim: #74808f;
        }
        body {
            margin: 0; padding: 0; font-family: system-ui, sans-serif;
            background: var(--bg-main); color: var(--text);
            display: flex; flex-direction: column; height: 100vh;
        }
        #map { width: 100%; height: 32vh; background: #000; }
        .container { padding: 16px; flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }

        .input-box { background: var(--bg-card); border: 1px solid var(--border); padding: 12px; border-radius: 8px; }
        .input-box label { font-size: 0.75em; text-transform: uppercase; color: var(--text-dim); display: block; margin-bottom: 6px; font-weight: bold; }
        .row { display: flex; gap: 8px; }
        input { flex: 1; background: #1a212b; border: 1px solid var(--border); padding: 12px; border-radius: 6px; color: white; font-size: 1em; }
        button { background: var(--signal-on); color: #000; border: none; padding: 12px 20px; font-weight: bold; border-radius: 6px; cursor: pointer; }

        .frota-container { background: var(--bg-card); border: 1px solid var(--border); padding: 12px; border-radius: 8px; }
        .frota-lista { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
        .tag-veiculo { background: #1a212b; border: 1px solid var(--border); padding: 6px 12px; border-radius: 20px; font-size: 0.85em; display: flex; align-items: center; gap: 8px; }
        .btn-remover { color: var(--danger); cursor: pointer; font-weight: bold; border: none; background: none; padding: 0; font-size: 1.1em; }

        .status-bar { padding: 12px; border-radius: 6px; text-align: center; font-weight: bold; font-size: 0.9em; }
        .status-online { background: rgba(0, 255, 166, 0.15); color: var(--signal-on); border: 1px solid var(--signal-on); }
        .status-offline { background: rgba(255, 176, 32, 0.15); color: var(--signal-off); border: 1px solid var(--signal-off); }
        .status-erro { background: rgba(255, 84, 112, 0.15); color: var(--danger); border: 1px solid var(--danger); }
        .status-bg { background: rgba(45, 212, 255, 0.15); color: var(--telemetry); border: 1px solid var(--telemetry); }

        .btn-row { display: flex; gap: 8px; }
        .btn-force { background: #2dd4ff; color: #000; flex: 2; padding: 14px; font-size: 0.95em; text-transform: uppercase; font-weight: bold; border-radius: 6px; border: none; cursor: pointer; }
        .btn-export { background: #1a212b; color: var(--text); border: 1px solid var(--border); flex: 1; padding: 14px; font-size: 0.85em; font-weight: bold; border-radius: 6px; cursor: pointer; }

        .telemetry-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 12px; }
        .telemetry-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.04); font-size: 0.9em; gap: 8px; }
        .telemetry-row b, .telemetry-row span { text-align: right; }
        .telemetry-row:last-child { border-bottom: none; }

        .badge { font-size: 0.75em; padding: 3px 8px; border-radius: 4px; font-weight: bold; }
        .badge-movimento { background: rgba(0,255,166,0.15); color: var(--signal-on); }
        .badge-parado { background: rgba(255,176,32,0.15); color: var(--signal-off); }
        .badge-perigo { background: rgba(255, 84, 112, 0.15); color: var(--danger); }

        .gps-warning { background: rgba(255,84,112,0.12); border: 1px solid var(--danger); color: var(--danger); padding: 10px 12px; border-radius: 6px; font-size: 0.85em; display: none; }
        .fila-info { font-size: 0.75em; color: var(--text-dim); text-align: center; }

        .auth-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 10000; display: none; }
        .auth-card { background: var(--bg-card); border: 1px solid var(--border); padding: 24px; border-radius: 12px; width: 90%; max-width: 360px; display: flex; flex-direction: column; gap: 16px; position: relative; }
        .auth-card h3 { margin: 0; color: var(--text); font-size: 1.2em; text-align: center; }
        .btn-fechar-modal { position: absolute; top: 12px; right: 12px; background: none; border: none; color: var(--text-dim); font-size: 1.2em; cursor: pointer; padding: 0; }
        .user-logado-info { font-size: 0.75em; color: var(--signal-on); text-align: center; margin-top: -4px; display: none; }
    </style>
</head>
<body>

<div id="authModal" class="auth-overlay">
    <div class="auth-card">
        <button class="btn-fechar-modal" id="btnFecharLogin">×</button>
        <h3>🔐 Autenticação Requerida</h3>
        <div>
            <label style="font-size: 0.75em; color: var(--text-dim); text-transform: uppercase; font-weight: bold; display: block; margin-bottom: 4px;">E-mail</label>
            <input type="email" id="authEmail" placeholder="seu-email@gmail.com" style="width: 100%; box-sizing: border-box;">
        </div>
        <div>
            <label style="font-size: 0.75em; color: var(--text-dim); text-transform: uppercase; font-weight: bold; display: block; margin-bottom: 4px;">Senha</label>
            <input type="password" id="authSenha" placeholder="******" style="width: 100%; box-sizing: border-box;">
        </div>
        <button id="btnConfirmarLogin" style="background: var(--telemetry); width: 100%;">Entrar e Executar</button>
    </div>
</div>

<div id="map"></div>

<div class="container">
    <div id="avisoGps" class="gps-warning"></div>

    <div class="input-box">
        <label>🏢 Empresa deste aparelho</label>
        <div class="row">
            <input type="text" id="empresaIdInput" placeholder="ID da empresa">
            <button id="btnSalvarEmpresa">Salvar</button>
        </div>
        <div id="empresaSalvaInfo" style="font-size:0.75em;color:var(--text-dim);margin-top:6px;"></div>
    </div>

    <div class="input-box">
        <label>Cadastrar Novo Veículo na Lista</label>
        <div id="userLogadoInfo" class="user-logado-info">Sessão Administrador Ativa</div>
        <div class="row" style="margin-top: 4px;">
            <input type="text" id="veiculoInput" placeholder="Ex: NISSAN ISA, FIAT UNO">
            <button id="btnAdicionar">Adicionar</button>
        </div>
    </div>

    <div class="frota-container">
        <div style="font-size: 0.75em; color: var(--text-dim); text-transform: uppercase; font-weight: bold;">Veículos Monitorados Neste Aparelho</div>
        <div class="frota-lista" id="listaFrotaLocal"></div>
    </div>

    <div id="statusConexao" class="status-bar status-offline">MODO OFFLINE</div>
    <div id="statusBackground" class="status-bar status-bg" style="display:none;"></div>
    <div class="fila-info" id="filaInfo"></div>

    <div class="btn-row">
        <button id="btnForcar" class="btn-force">📡 Forçar Sincronização</button>
        <button id="btnExportar" class="btn-export">⬇️ Exportar Rota (CSV)</button>
    </div>
    <button id="btnDiagnostico" class="btn-export" style="width:100%;">🔍 Testar Conexão com Serviço de Endereço</button>
    <div id="diagnosticoResultado" class="fila-info" style="text-align:left; white-space:pre-wrap; word-break:break-word;"></div>

    <div class="telemetry-card">
        <div style="font-size: 0.75em; color: var(--text-dim); text-transform: uppercase; margin-bottom: 8px; font-weight: bold;">Última Telemetria Gerada</div>
        <div class="telemetry-row"><span>Situação</span><span id="badStatus" class="badge badge-parado">PARADO</span></div>
        <div class="telemetry-row"><span>Velocidade</span><b id="txtVelocidade">0 km/h</b></div>
        <div class="telemetry-row"><span>Precisão GPS</span><b id="txtPrecisao">—</b></div>
        <div class="telemetry-row"><span>Tempo de Parada</span><b id="txtTempoParado">00:00:00</b></div>
        <div class="telemetry-row"><span>Coordenadas</span><b id="txtCoords">—</b></div>
        <div class="telemetry-row"><span>Rua</span><b id="txtRua">—</b></div>
        <div class="telemetry-row"><span>Bairro</span><b id="txtBairro">—</b></div>
        <div class="telemetry-row"><span>Cidade</span><b id="txtCidade">—</b></div>
        <div class="telemetry-row"><span>Estado (UF)</span><b id="txtEstado">—</b></div>
        <div class="telemetry-row"><span>Data</span><b id="txtData">—</b></div>
        <div class="telemetry-row"><span>Horário do último ponto</span><span id="txtHora" style="color:var(--telemetry)">—</span></div>
        <div class="telemetry-row"><span>🌡️ Temperatura no local</span><b id="txtTemperatura">—</b></div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="capacitor.js"></script>

<script>
// ===================== CONFIGURAÇÃO =====================
var firebaseConfig = {
    apiKey: "AIzaSyDwKIS8wL3D7OuaysVFV_xyAsFsKo2eXzY",
    authDomain: "everton-gps.firebaseapp.com",
    databaseURL: "https://everton-gps-default-rtdb.firebaseio.com",
    projectId: "everton-gps",
    storageBucket: "everton-gps.firebasestorage.app",
    messagingSenderId: "688936933095",
    appId: "1:688936933095:web:790b2407334e8b148e3442"
};
firebase.initializeApp(firebaseConfig);
var db = firebase.database();
var auth = firebase.auth();

var LIMITE_VELOCIDADE = 80;
var EMPRESA_ID = localStorage.getItem('empresa_id') || "tricolordosul5x0_gmail_com";
document.getElementById('empresaIdInput').value = EMPRESA_ID;
atualizarInfoEmpresaSalva();

function atualizarInfoEmpresaSalva() {
    document.getElementById('empresaSalvaInfo').textContent = "Enviando dados para: " + EMPRESA_ID;
}

document.getElementById('btnSalvarEmpresa').addEventListener('click', function() {
    var novo = document.getElementById('empresaIdInput').value.trim();
    if (!novo) return alert("Digite um ID válido.");
    localStorage.setItem('empresa_id', novo);
    EMPRESA_ID = novo;
    atualizarInfoEmpresaSalva();
    alert("Empresa salva com sucesso!");
});

var INTERVALO_GEOCODIFICACAO_MS = 1100;
var MAX_TENTATIVAS_GEOCODIFICACAO = 3;
var TIMEOUT_FETCH_MS = 8000;

function fetchComTimeout(url, opcoes, timeoutMs) {
    var controller = new AbortController();
    var id = setTimeout(() => controller.abort(), timeoutMs);
    return fetch(url, Object.assign({}, opcoes, { signal: controller.signal })).finally(() => clearTimeout(id));
}

function gerarIdPonto(ts) {
    return ts + "_" + Math.random().toString(36).slice(2, 8);
}

function sanitizarChavePath(valor) {
    return String(valor).replace(/[.#$\[\]\/]/g, "_");
}

var isNative = !!(window.Capacitor && window.Capacitor.isNativePlatform && window.Capacitor.isNativePlatform());
var bgWatcherId = null;

function atualizarBarraBackground(msg, mostrar) {
    var el = document.getElementById('statusBackground');
    if (!mostrar) { el.style.display = "none"; return; }
    el.style.display = "block"; el.textContent = msg;
}

function checarContextoSeguro() {
    if (isNative) return true;
    var seguro = window.isSecureContext || location.hostname === "localhost" || location.hostname === "127.0.0.1";
    if (!seguro) {
        mostrarAvisoGps("⚠️ Esta página precisa estar em HTTPS para acessar o GPS.");
        return false;
    }
    return true;
}
function mostrarAvisoGps(msg) {
    var box = document.getElementById('avisoGps');
    box.textContent = msg; box.style.display = "block";
}
function esconderAvisoGps() { document.getElementById('avisoGps').style.display = "none"; }

// ===================== MAPA =====================
var map = L.map('map', { zoomControl: false }).setView([-29.6133, -52.1919], 13);
L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);
var marcador = L.marker([-29.6133, -52.1919]).addTo(map);
var circuloPrecisao = L.circle([-29.6133, -52.1919], { radius: 0, color: '#2dd4ff', fillOpacity: 0.1, weight: 1 }).addTo(map);
var polilinhaRota = L.polyline([], {color: 'rgba(45,212,255,0.35)', weight: 3, dashArray: '4,6'}).addTo(map);
var polilinhaRuas = L.polyline([], {color: '#2dd4ff', weight: 6}).addTo(map);

// ===================== MEMÓRIA LOCAL =====================
var listaVeiculos = JSON.parse(localStorage.getItem('frota_veiculos') || "[]");
var filaPendentes = JSON.parse(localStorage.getItem('fila_rastreio') || "[]");
var filaGeocodificarDepois = JSON.parse(localStorage.getItem('fila_geocodificar') || "[]");
var historicoCoordenadasLocais = JSON.parse(localStorage.getItem('historico_coords') || "[]");
var registroCompleto = JSON.parse(localStorage.getItem('registro_completo') || "[]");
var ultimoIdPontoParadaGravado = localStorage.getItem('ultimo_id_ponto_parada_gravado') || null;

if (historicoCoordenadasLocais.length > 0) {
    polilinhaRota.setLatLngs(historicoCoordenadasLocais);
    var ultimo = historicoCoordenadasLocais[historicoCoordenadasLocais.length - 1];
    map.setView(ultimo, 16); marcador.setLatLng(ultimo);
}

function salvarTudo() {
    localStorage.setItem('frota_veiculos', JSON.stringify(listaVeiculos));
    localStorage.setItem('fila_rastreio', JSON.stringify(filaPendentes));
    localStorage.setItem('fila_geocodificar', JSON.stringify(filaGeocodificarDepois));
    localStorage.setItem('historico_coords', JSON.stringify(historicoCoordenadasLocais));
    if (registroCompleto.length > 5000) registroCompleto = registroCompleto.slice(-5000);
    localStorage.setItem('registro_completo', JSON.stringify(registroCompleto));
    if(ultimoIdPontoParadaGravado) localStorage.setItem('ultimo_id_ponto_parada_gravado', ultimoIdPontoParadaGravado);
}

// ===================== MODAL LOGIN =====================
var acaoPendente = null;
function abrirModalLogin(callbackAcao) {
    if (auth.currentUser) { callbackAcao(); return; }
    acaoPendente = callbackAcao;
    document.getElementById('authModal').style.display = "flex";
}
document.getElementById('btnFecharLogin').addEventListener('click', function() {
    document.getElementById('authModal').style.display = "none"; acaoPendente = null;
});
document.getElementById('btnConfirmarLogin').addEventListener('click', function() {
    var email = document.getElementById('authEmail').value.trim();
    var senha = document.getElementById('authSenha').value;
    if (!email || !senha) return alert("Preencha tudo!");
    document.getElementById('btnConfirmarLogin').disabled = true;
    auth.signInWithEmailAndPassword(email, senha).then(() => {
        document.getElementById('authModal').style.display = "none";
        if (acaoPendente) { acaoPendente(); acaoPendente = null; }
    }).catch(err => alert("Erro: " + err.message)).finally(() => { document.getElementById('btnConfirmarLogin').disabled = false; });
});
auth.onAuthStateChanged(user => { document.getElementById('userLogadoInfo').style.display = user ? "block" : "none"; });

// ===================== FROTA =====================
function renderizarFrotaLocal() {
    var container = document.getElementById('listaFrotaLocal'); container.innerHTML = "";
    if (listaVeiculos.length === 0) { container.innerHTML = "<span>Nenhum veículo adicionado.</span>"; return; }
    listaVeiculos.forEach((nome, index) => {
        var tag = document.createElement('div'); tag.className = "tag-veiculo";
        tag.innerHTML = `🚗 <b>${nome}</b> <button class="btn-remover" onclick="removerVeiculoExigindoSenha(${index})">×</button>`;
        container.appendChild(tag);
    });
}
document.getElementById('btnAdicionar').addEventListener('click', function() {
    var nome = document.getElementById('veiculoInput').value.trim().toUpperCase();
    if (!nome) return alert('Digite um nome!');
    if (listaVeiculos.includes(nome)) return alert('Já cadastrado!');
    abrirModalLogin(function() {
        listaVeiculos.push(nome); salvarTudo();
        document.getElementById('veiculoInput').value = ""; renderizarFrotaLocal();
        auth.signOut();
    });
});
window.removerVeiculoExigindoSenha = function(index) {
    abrirModalLogin(function() {
        if (confirm(`Remover veículo?`)) { listaVeiculos.splice(index, 1); salvarTudo(); renderizarFrotaLocal(); }
        auth.signOut();
    });
};

// ===================== TIMER DE PARADA =====================
var inicioParadaTs = localStorage.getItem('inicio_parada_ts') ? parseInt(localStorage.getItem('inicio_parada_ts'), 10) : null;
var tempoParadoSegundos = 0;
var jaGravouPontoInicialParada = localStorage.getItem('ja_gravou_parada') === 'true';

function formatarTempoParado(segundos) {
    var hrs = Math.floor(segundos / 3600).toString().padStart(2, '0');
    var mins = Math.floor((segundos % 3600) / 60).toString().padStart(2, '0');
    var segs = (segundos % 60).toString().padStart(2, '0');
    return `${hrs}:${mins}:${segs}`;
}

function atualizarTextoTempoParado() {
    if (document.getElementById('badStatus').textContent.indexOf("PARADO") !== -1 && inicioParadaTs) {
        tempoParadoSegundos = Math.max(0, Math.floor((Date.now() - inicioParadaTs) / 1000));
    } else {
        tempoParadoSegundos = 0;
    }
    document.getElementById('txtTempoParado').textContent = formatarTempoParado(tempoParadoSegundos);
}

// Relógio Visual na Tela
setInterval(function() {
    atualizarTextoTempoParado();
}, 1000);

// ===================== CAPTURA E PROCESSAMENTO GPS =====================
var DISTANCIA_MINIMA_MOVIMENTO_M = 25; 
var RAIO_REUTILIZAR_ENDERECO_M = 40;
var ultimoEnderecoConhecido = null;
var ultimoPontoHistoricoTs = localStorage.getItem('ultimo_ponto_historico_ts') ? parseInt(localStorage.getItem('ultimo_ponto_historico_ts'), 10) : 0;
var ultimoPontoRegistrado = historicoCoordenadasLocais.length > 0 ? historicoCoordenadasLocais[historicoCoordenadasLocais.length - 1] : null;
var errosGpsConsecutivos = 0;
var ultimaLeituraCompleta = null;

function calcularDistanciaMetros(lat1, lon1, lat2, lon2) {
    var R = 6371000;
    var dLat = (lat2 - lat1) * Math.PI / 180;
    var dLon = (lon2 - lon1) * Math.PI / 180;
    var a = Math.sin(dLat / 2) * Math.sin(dLat / 2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) * Math.sin(dLon / 2);
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

function processarNovaPosicao(lat, lon, precisaoRaw, velRaw) {
    esconderAvisoGps(); errosGpsConsecutivos = 0;
    var precisao = precisaoRaw ? Math.round(precisaoRaw) : null;
    var vel = velRaw ? Math.round(velRaw * 3.6) : 0;
    var agora = new Date(); var agoraTs = agora.getTime();

    map.setView([lat, lon], map.getZoom() < 14 ? 16 : map.getZoom());
    marcador.setLatLng([lat, lon]);
    if (precisao) { circuloPrecisao.setLatLng([lat, lon]).setRadius(precisao); }

    document.getElementById('txtVelocidade').textContent = vel + " km/h";
    document.getElementById('txtData').textContent = agora.toLocaleDateString('pt-BR');
    document.getElementById('txtHora').textContent = agora.toLocaleTimeString('pt-BR');
    document.getElementById('txtPrecisao').textContent = precisao ? `± ${precisao} m` : "—";
    document.getElementById('txtCoords').textContent = `${lat.toFixed(6)}, ${lon.toFixed(6)}`;

    var LIMITE_MOVIMENTO_KMH = 5; 
    var situacao = "PARADO";
    var badgeStatus = document.getElementById('badStatus');
    var deveGravarNoHistorico = false;

    if (vel >= LIMITE_MOVIMENTO_KMH) {
        situacao = (vel > LIMITE_VELOCIDADE) ? "VELOCIDADE ACIMA DO LIMITE" : "EM MOVIMENTO";
        badgeStatus.textContent = situacao;
        badgeStatus.className = (vel > LIMITE_VELOCIDADE) ? "badge badge-perigo" : "badge badge-movimento";
        
        // Reseta cronômetros de parada de forma definitiva apenas se o carro andou!
        inicioParadaTs = null; jaGravouPontoInicialParada = false; ultimoIdPontoParadaGravado = null;
        localStorage.removeItem('inicio_parada_ts');
        localStorage.removeItem('ja_gravou_parada');
        localStorage.removeItem('ultimo_id_ponto_parada_gravado');

        var distanciaDoUltimoPonto = ultimoPontoRegistrado ? calcularDistanciaMetros(ultimoPontoRegistrado[0], ultimoPontoRegistrado[1], lat, lon) : Infinity;
        var tempoDesdeUltimoPontoMs = agoraTs - ultimoPontoHistoricoTs;

        if (distanciaDoUltimoPonto >= DISTANCIA_MINIMA_MOVIMENTO_M || tempoDesdeUltimoPontoMs >= 30000 || !ultimoPontoRegistrado) {
            deveGravarNoHistorico = true;
        }
    } else {
        situacao = "PARADO"; badgeStatus.textContent = "PARADO"; badgeStatus.className = "badge badge-parado";
        
        // Sem limites de inatividade arbitrários. Se parou, salva o timestamp fixo na memória física.
        if (!inicioParadaTs) {
            inicioParadaTs = agoraTs;
            localStorage.setItem('inicio_parada_ts', String(inicioParadaTs));
        }

        if (!jaGravouPontoInicialParada) {
            deveGravarNoHistorico = true;
            jaGravouPontoInicialParada = true;
            localStorage.setItem('ja_gravou_parada', 'true');
        }
    }

    atualizarTextoTempoParado();

    ultimaLeituraCompleta = {
        lat: lat, lon: lon, velocidade: vel, status: situacao, precisao: precisao,
        hora: agora.toLocaleTimeString('pt-BR'), data: agora.toLocaleDateString('pt-BR'),
        tempoParado: document.getElementById('txtTempoParado').textContent
    };
    
    sincronizarTempoRealImediato();

    if (deveGravarNoHistorico) {
        ultimoPontoRegistrado = [lat, lon];
        ultimoPontoHistoricoTs = agoraTs;
        localStorage.setItem('ultimo_ponto_historico_ts', String(ultimoPontoHistoricoTs));

        historicoCoordenadasLocais.push([lat, lon]);
        if (historicoCoordenadasLocais.length > 2000) historicoCoordenadasLocais.shift();
        polilinhaRota.setLatLngs(historicoCoordenadasLocais);
        agendarEncaixeNasRuas(); talvezBuscarTemperatura(lat, lon);

        var idPonto = gerarIdPonto(agoraTs);
        if (situacao === "PARADO") {
            ultimoIdPontoParadaGravado = idPonto;
        }

        var registro;
        var distanciaDoUltimoEndereco = ultimoEnderecoConhecido ? calcularDistanciaMetros(ultimoEnderecoConhecido.lat, ultimoEnderecoConhecido.lon, lat, lon) : Infinity;

        if (ultimoEnderecoConhecido && distanciaDoUltimoEndereco <= RAIO_REUTILIZAR_ENDERECO_M) {
            document.getElementById('txtRua').textContent = ultimoEnderecoConhecido.rua;
            document.getElementById('txtBairro').textContent = ultimoEnderecoConhecido.bairro;
            document.getElementById('txtCidade').textContent = ultimoEnderecoConhecido.cidade;
            document.getElementById('txtEstado').textContent = ultimoEnderecoConhecido.estado;

            registro = {
                id: idPonto, lat: lat, lon: lon, velocidade: vel, status: situacao,
                tempoParado: document.getElementById('txtTempoParado').textContent,
                hora: agora.toLocaleTimeString('pt-BR'), data: agora.toLocaleDateString('pt-BR'),
                rua: ultimoEnderecoConhecido.rua, bairro: ultimoEnderecoConhecido.bairro,
                cidade: ultimoEnderecoConhecido.cidade, estado: ultimoEnderecoConhecido.estado, endereco: ultimoEnderecoConhecido.endereco
            };
            registroCompleto.push(registro);
            if (listaVeiculos.length > 0) {
                listaVeiculos.forEach(vNome => { filaPendentes.push(Object.assign({ vID: vNome, empresaId: EMPRESA_ID }, registro)); });
            }
        } else {
            document.getElementById('txtRua').textContent = "Buscando...";
            document.getElementById('txtBairro').textContent = "Buscando...";
            document.getElementById('txtCidade').textContent = "Buscando...";
            document.getElementById('txtEstado').textContent = "Buscando...";

            registro = {
                id: idPonto, lat: lat, lon: lon, velocidade: vel, status: situacao,
                tempoParado: document.getElementById('txtTempoParado').textContent,
                hora: agora.toLocaleTimeString('pt-BR'), data: agora.toLocaleDateString('pt-BR'),
                rua: "Buscando endereço...", bairro: "Buscando endereço...", cidade: "Buscando endereço...", estado: "Buscando endereço...", endereco: "Buscando endereço..."
            };
            registroCompleto.push(registro);
            if (listaVeiculos.length > 0) {
                listaVeiculos.forEach(vNome => { filaPendentes.push(Object.assign({ vID: vNome, empresaId: EMPRESA_ID }, registro)); });
            }
            filaGeocodificarDepois.push({ id: idPonto, lat: lat, lon: lon, ts: agoraTs });
        }

        salvarTudo(); atualizarInterfaceEstado(); enviarDadosFila(); processarFilaGeocodificacao();
    }
}

// Envia dados instantâneos para a aba de Monitoramento em Tempo Real
function sincronizarTempoRealImediato() {
    if (!ultimaLeituraCompleta || listaVeiculos.length === 0 || !navigator.onLine) return;
    var updates = {};
    listaVeiculos.forEach(vNome => {
        var basePath = 'empresas/' + sanitizarChavePath(EMPRESA_ID) + '/veiculos/' + sanitizarChavePath(vNome) + '/atual/';
        updates[basePath + 'lat'] = ultimaLeituraCompleta.lat;
        updates[basePath + 'lon'] = ultimaLeituraCompleta.lon;
        updates[basePath + 'velocidade'] = ultimaLeituraCompleta.velocidade;
        updates[basePath + 'status'] = ultimaLeituraCompleta.status;
        updates[basePath + 'hora'] = ultimaLeituraCompleta.hora;
        updates[basePath + 'data'] = ultimaLeituraCompleta.data;
        updates[basePath + 'tempoParado'] = document.getElementById('txtTempoParado').textContent; 
    });
    db.ref().update(updates).catch(e => console.warn(e));
}

// --- SOLUÇÃO DO ADMIN: Atualiza o nó do histórico de 30 em 30 segundos enquanto estiver estacionado ---
setInterval(function() {
    var statusAtual = document.getElementById('badStatus').textContent;
    if (statusAtual.indexOf("PARADO") !== -1 && ultimoIdPontoParadaGravado && listaVeiculos.length > 0 && navigator.onLine) {
        var tempoAtualizado = document.getElementById('txtTempoParado').textContent;
        var agoraStr = new Date().toLocaleTimeString('pt-BR');
        var patchHistorico = {};
        
        listaVeiculos.forEach(vNome => {
            var path = 'empresas/' + sanitizarChavePath(EMPRESA_ID) + '/veiculos/' + sanitizarChavePath(vNome) + '/historico/' + ultimoIdPontoParadaGravado + '/';
            patchHistorico[path + 'tempoParado'] = tempoAtualizado;
            // Atualiza a hora interna do ponto para o Admin saber que ele continua ali parado agora
            patchHistorico[path + 'horaFinalParada'] = agoraStr; 
        });
        
        db.ref().update(patchHistorico).catch(e => console.warn("Erro ao atualizar histórico dinâmico:", e));
    }
}, 30000);

// ===================== NATIVO BACKGROUND GPS =====================
function tratarErroGps(erro) {
    console.error(erro); errosGpsConsecutivos++;
    if (erro.code === 1) mostrarAvisoGps("⚠️ Permissão de localização negada.");
    else if (errosGpsConsecutivos >= 4) mostrarAvisoGps("⚠️ Instabilidade no sinal do GPS.");
}

function iniciarRastreioNativoBackground() {
    var BG = window.Capacitor.Plugins.BackgroundGeolocation;
    if (!BG) { iniciarRastreioWeb(); return; }
    atualizarBarraBackground("🟢 Rastreio em segundo plano ATIVO", true);
    BG.addWatcher({
        backgroundMessage: "Gravando rotas e telemetria em tempo real...",
        backgroundTitle: "Everton GPS Corporativo",
        requestPermissions: true, stale: false, distanceFilter: 0
    }, function(location, error) {
        if (error) return;
        if (location) processarNovaPosicao(location.latitude, location.longitude, location.accuracy, location.speed);
    }).then(id => { bgWatcherId = id; });
}

function iniciarRastreioWeb() {
    if (!checarContextoSeguro() || !navigator.geolocation) return;
    navigator.geolocation.watchPosition(position => {
        processarNovaPosicao(position.coords.latitude, position.coords.longitude, position.coords.accuracy, position.coords.speed);
    }, tratarErroGps, { enableHighAccuracy: true, maximumAge: 3000, timeout: 20000 });
}

function iniciarRastreioGps() { if (isNative) { iniciarRastreioNativoBackground(); } else { iniciarRastreioWeb(); } }
iniciarRastreioGps();

// ===================== OUTROS SERVIÇOS =====================
var encaixeAgendado = false; var ultimoEncaixeTs = 0;
function agendarEncaixeNasRuas() {
    var agora = Date.now(); var esperar = Math.max(0, 4000 - (agora - ultimoEncaixeTs));
    if (encaixeAgendado) return; encaixeAgendado = true;
    setTimeout(executarEncaixeNasRuas, esperar);
}
function ejecutarEncaixeNasRuas() {
    encaixeAgendado = false; ultimoEncaixeTs = Date.now();
    if (historicoCoordenadasLocais.length < 2) return;
    var pontos = historicoCoordenadasLocais.slice(-100);
    var coordsStr = pontos.map(p => p[1].toFixed(6) + "," + p[0].toFixed(6)).join(";");
    fetchComTimeout(`https://router.project-osrm.org/match/v1/driving/${coordsStr}?overview=full&geometries=geojson`, {}, TIMEOUT_FETCH_MS)
        .then(res => res.json()).then(data => {
            if (data.code === "Ok" && data.matchings && data.matchings.length > 0) {
                var pontosRua = [];
                data.matchings.forEach(m => { m.geometry.coordinates.forEach(c => pontosRua.push([c[1], c[0]])); });
                polilinhaRuas.setLatLngs(pontosRua);
            }
        }).catch(e => console.warn(e));
}

var ultimaBuscaTempTs = 0; var buscandoTemp = false;
function talvezBuscarTemperatura(lat, lon) {
    var agora = Date.now(); if (buscandoTemp || (agora - ultimaBuscaTempTs) < 300000) return;
    buscandoTemp = true; ultimaBuscaTempTs = agora;
    fetchComTimeout(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,apparent_temperature&temperature_unit=celsius&timezone=auto`, {}, TIMEOUT_FETCH_MS)
        .then(res => res.json()).then(data => {
            if (data && data.current && typeof data.current.temperature_2m === "number") {
                var sensacao = typeof data.current.apparent_temperature === "number" ? ` (sensação ${data.current.apparent_temperature.toFixed(1)}°C)` : "";
                document.getElementById('txtTemperatura').textContent = data.current.temperature_2m.toFixed(1) + " °C" + sensacao;
            }
        }).catch(e => console.warn(e)).finally(() => { buscandoTemp = false; });
}

var geocodificando = false;
function processarFilaGeocodificacao() {
    if (geocodificando || filaGeocodificarDepois.length === 0) return;
    geocodificando = true; atualizarInterfaceEstado();
    var ponto = filaGeocodificarDepois[filaGeocodificarDepois.length - 1];

    fetchComTimeout(`https://nominatim.openstreetmap.org/reverse?lat=${ponto.lat}&lon=${ponto.lon}&format=json&zoom=18&addressdetails=1`, { headers: { 'Accept-Language': 'pt-BR' } }, TIMEOUT_FETCH_MS)
        .then(res => res.json()).then(data => {
            var addr = data.address || {};
            var rua = addr.road || addr.pedestrian || "Rua não localizada";
            var bairro = addr.suburb || addr.neighbourhood || "Bairro não localizado";
            var cidade = addr.city || addr.town || "Cidade não localizada";
            var estado = addr.state || "Estado não localizado";
            aplicarEnderecoNoPonto(ponto.id, rua, bairro, city = cidade, estado);
            filaGeocodificarDepois.pop();
        }).catch(err => {
            ponto.tentativas = (ponto.tentativas || 0) + 1;
            if (ponto.tentativas >= MAX_TENTATIVAS_GEOCODIFICACAO) filaGeocodificarDepois.pop();
        }).finally(() => {
            geocodificando = false; salvarTudo(); atualizarInterfaceEstado();
            if (filaGeocodificarDepois.length > 0) setTimeout(processarFilaGeocodificacao, INTERVALO_GEOCODIFICACAO_MS);
        });
}

function aplicarEnderecoNoPonto(idPonto, rua, bairro, cidade, estado) {
    var enderecoTxt = `${rua}, ${bairro} - ${cidade}/${estado}`;
    var reg = registroCompleto.find(r => r.id === idPonto);
    if (reg) {
        reg.rua = rua; reg.bairro = bairro; reg.cidade = cidade; reg.estado = estado; reg.endereco = enderecoTxt;
        if (rua !== "Endereço indisponível") ultimoEnderecoConhecido = { lat: reg.lat, lon: reg.lon, rua: rua, bairro: bairro, cidade: cidade, estado: estado, endereco: enderecoTxt };
    }
    if (registroCompleto.length > 0 && registroCompleto[registroCompleto.length - 1].id === idPonto) {
        document.getElementById('txtRua').textContent = rua; document.getElementById('txtBairro').textContent = bairro;
        document.getElementById('txtCidade').textContent = cidade; document.getElementById('txtEstado').textContent = estado;
    }
    filaPendentes.forEach(p => { if (p.id === idPonto) { p.rua = rua; p.bairro = bairro; p.cidade = cidade; p.estado = estado; p.endereco = enderecoTxt; } });
    if (listaVeiculos.length > 0) {
        var patch = {};
        listaVeiculos.forEach(vNome => {
            var basePath = 'empresas/' + sanitizarChavePath(EMPRESA_ID) + '/veiculos/' + sanitizarChavePath(vNome) + '/historico/' + idPonto + '/';
            patch[basePath + 'rua'] = rua; patch[basePath + 'bairro'] = bairro; patch[basePath + 'cidade'] = cidade; patch[basePath + 'estado'] = estado; patch[basePath + 'endereco'] = enderecoTxt;
        });
        db.ref().update(patch).catch(e => console.warn(e));
    }
}

var enviando = false; var falhasConsecutivasLote = 0;
function enviarDadosFila() {
    if (enviando || filaPendentes.length === 0) { atualizarInterfaceEstado(); return; }
    enviando = true; var lote = filaPendentes.slice(0, 25); var updates = {};
    try {
        lote.forEach(item => {
            var basePath = 'empresas/' + sanitizarChavePath(item.empresaId || EMPRESA_ID) + '/veiculos/' + sanitizarChavePath(item.vID) + '/historico/' + item.id;
            updates[basePath] = item;
        });
        db.ref().update(updates).then(() => {
            filaPendentes.splice(0, lote.length); falhasConsecutivasLote = 0; salvarTudo();
        }).catch(e => {
            falhasConsecutivasLote++; if (falhasConsecutivasLote >= 5) { filaPendentes.shift(); falhasConsecutivasLote = 0; salvarTudo(); }
        }).finally(() => { enviando = false; atualizarInterfaceEstado(); if (filaPendentes.length > 0) enviarDadosFila(); });
    } catch (e) { filaPendentes.shift(); enviando = false; atualizarInterfaceEstado(); }
}

function atualizarInterfaceEstado() {
    var barra = document.getElementById('statusConexao'); var totalPendente = filaPendentes.length + filaGeocodificarDepois.length;
    if (navigator.onLine && totalPendente === 0 && listaVeiculos.length > 0) {
        barra.className = "status-bar status-online"; barra.innerHTML = "📡 SISTEMA ONLINE — Sincronizado!";
    } else if (navigator.onLine && listaVeiculos.length > 0) {
        barra.className = "status-bar status-online"; barra.innerHTML = `📡 ONLINE — Sincronizando... <span>(${totalPendente} pendentes)</span>`;
    } else {
        barra.className = "status-bar status-offline"; barra.innerHTML = `MODO OFFLINE <span>(${totalPendente} pendentes)</span>`;
    }
    document.getElementById('filaInfo').textContent = registroCompleto.length + " pontos gravados localmente (" + filaPendentes.length + " no Firebase)";
}

window.addEventListener('online', function() { atualizarInterfaceEstado(); processarFilaGeocodificacao(); enviarDadosFila(); agendarEncaixeNasRuas(); });
window.addEventListener('offline', atualizarInterfaceEstado);
document.getElementById('btnForcar').addEventListener('click', function() { processarFilaGeocodificacao(); enviarDadosFila(); sincronizarTempoRealImediato(); });

document.getElementById('btnExportar').addEventListener('click', function() {
    if (registroCompleto.length === 0) return alert("Sem pontos.");
    var linhas = ["Data;Hora;Latitude;Longitude;Velocidade(km/h);Situacao;Rua;Bairro;Cidade;Estado"];
    registroCompleto.forEach(p => { linhas.push([p.data, p.hora, p.lat, p.lon, p.velocidade, p.status, p.rua, p.bairro, p.cidade, p.estado].join(";")); });
    var blob = new Blob([linhas.join("\n")], { type: "text/csv;charset=utf-8;" });
    var url = URL.createObjectURL(blob); var a = document.createElement("a"); a.href = url; a.download = "rota_real_" + new Date().toISOString().slice(0,10) + ".csv"; a.click(); URL.revokeObjectURL(url);
});

document.getElementById('btnDiagnostico').addEventListener('click', function() {
    var out = document.getElementById('diagnosticoResultado'); out.textContent = "Testando...";
    fetchComTimeout("https://nominatim.openstreetmap.org/reverse?lat=-29.6133&lon=-52.1919&format=json&zoom=18", {}, 10000)
        .then(res => res.text()).then(txt => { out.textContent = "✅ SUCESSO\n\n" + txt.slice(0, 300); }).catch(e => { out.textContent = "❌ ERRO: " + e.message; });
});

renderizarFrotaLocal(); atualizarInterfaceEstado(); checarContextoSeguro();
setInterval(function() { if (filaGeocodificarDepois.length > 0) processarFilaGeocodificacao(); if (filaPendentes.length > 0) enviarDadosFila(); sincronizarTempoRealImediato(); }, 6000);
</script>
